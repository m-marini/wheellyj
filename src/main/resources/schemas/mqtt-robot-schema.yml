---
$schema: https://json-schema.org/draft/2020-12/schema
$id: https://mmarini.org/wheelly/mqtt-robot-schema-1.2
title: Robot
type: object
properties:
  $schema:
    const: https://mmarini.org/wheelly/mqtt-robot-schema-1.2
  class:
    const: org.mmarini.wheelly.mqtt.MqttRobot
  brokerUrl:
    type: string
  clientId:
    type: string
  user:
    type: string
  password:
    type: string
  robotId:
    type: string
  qrDeviceId:
    type: string
  retryInterval:
    type: integer
    minimum: 1
  configureTimeout:
    type: integer
    minimum: 1
  contactRadius:
    type: number
    exclusiveMinimum: 0
  maxRadarDistance:
    type: number
    exclusiveMinimum: 0
  lidarFOV:
    type: integer
    minimum: 1
    maximum: 90
  headMinAngle:
    type: integer
    minimum: -180
    maximum: 360
  headMaxAngle:
    type: integer
    minimum: -180
    maximum: 360
  headX:
    type: number
  headY:
    type: number
  frontLidarDistance:
    type: number
  rearLidarDistance:
    type: number
  cameraDistance:
    type: number
  cameraFOV:
    type: integer
    minimum: 1
    maximum: 179
  directionRange:
    type: integer
    minimum: 1
    maximum: 90
  targetRange:
    type: number
    exclusiveMinimum: 0
  maxRotRange:
    type: integer
    minimum: 0
    maximum: 180
  maxRotPps:
    type: integer
    minimum: 0
    maximum: 20
  maxSpeed:
    type: integer
    minimum: 0
    maximum: 60
  decelerateDistance:
    type: number
    exclusiveMinimum: 0
    maximum: 5
  sendInterval:
    type: integer
    minimum: 1
    maximum: 60000
  scanInterval:
    type: integer
    minimum: 1
    maximum: 60000
  config:
    type: array
    items:
      $ref: "#/$defs/Config"
required:
  - $schema
  - class
  - user
  - password
  - robotId
  - qrDeviceId
  - contactRadius
  - lidarFOV
  - cameraFOV
  - maxRadarDistance
$defs:
  Config:
    type: object
    properties:
      asr:
        type: integer
        minimum: 0
        maximum: 16383
      lambdaFactor:
        type: integer
        minimum: 0
        maximum: 100
      maxPulseInterval:
        type: integer
        minimum: 1
        maximum: 10000
      delayedInterval:
        type: integer
        minimum: 1
        maximum: 10000
      tau:
        type: integer
        minimum: 1
        maximum: 10000

